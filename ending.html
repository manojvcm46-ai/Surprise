<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>And if I had to choose again... 💖</title>
    <!-- GSAP for smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Dancing+Script:wght@700&family=Quicksand:wght@500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            min-height: 100vh;
            background: #08080a;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
            padding: 3rem 2rem 4rem;
        }

        /* Ambient Glow in center */
        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Custom Spotlight & Cursor */
        .custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff4fd8, #8f5bff);
            box-shadow: 0 0 20px #ff4fd8;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10000;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1), background 0.3s;
            animation: cursorPulse 2s infinite ease-in-out;
        }

        @keyframes cursorPulse {
            0%, 100% {
                box-shadow: 0 0 15px #ff4fd8, 0 0 5px #8f5bff;
            }
            50% {
                box-shadow: 0 0 30px #ff4fd8, 0 0 15px #8f5bff;
            }
        }

        .custom-cursor.hovered {
            transform: translate(-50%, -50%) scale(1.6);
            background: linear-gradient(45deg, #8f5bff, #ff4fd8);
            box-shadow: 0 0 35px #8f5bff, 0 0 15px #ff4fd8;
        }

        .mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.15) 0%, rgba(255, 182, 193, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
            will-change: transform;
        }

        .container {
            text-align: center;
            z-index: 1;
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        /* Elegant cinematic message container */
        .ending-message {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            line-height: 1.9;
            margin-bottom: 3rem;
            text-align: center;
            max-width: 700px;
        }

        .ending-para {
            font-size: 1.85rem;
            margin-bottom: 1.8rem;
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.3), 0 0 25px rgba(255, 105, 180, 0.25);
        }

        .ending-para.highlight {
            color: #ff69b4;
            font-size: 2.2rem;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.6), 0 0 35px rgba(255, 105, 180, 0.3);
        }

        .ending-para.sign {
            font-size: 1.6rem;
            color: rgba(255, 182, 217, 0.7);
            margin-top: 1rem;
        }

        /* Blinking typing cursor */
        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 2rem;
            background-color: #ff69b4;
            margin-left: 5px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        /* The End Glowing reveal */
        .the-end {
            font-family: 'Bubblegum Sans', cursive;
            font-size: 2.5rem;
            color: #ff69b4;
            opacity: 0;
            transform: scale(0.8);
            text-shadow: 0 0 12px rgba(255, 105, 180, 0.8), 0 0 25px rgba(255, 105, 180, 0.5);
            animation: pulseSign 3s infinite ease-in-out;
            display: inline-block;
        }

        /* Interactive floating items */
        .floating {
            position: fixed;
            pointer-events: none;
            z-index: 1;
        }

        .click-heart {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            font-size: 1.5rem;
            animation: rotateParticle 1.5s linear;
        }

        /* Keyframes */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes pulseSign {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.2); }
        }

        @keyframes rotateParticle {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(0.2) rotate(360deg); }
        }

        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            * {
                cursor: auto !important;
            }

            .custom-cursor, .mouse-glow {
                display: none !important;
            }

            .ending-para {
                font-size: 1.4rem;
            }

            .ending-para.highlight {
                font-size: 1.7rem;
            }

            .ending-para.sign {
                font-size: 1.2rem;
            }

            .typing-cursor {
                height: 1.5rem;
            }

            .the-end {
                font-size: 2rem;
            }
        }

        /* Premium Glassmorphism Music Toggle Button */
        .music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(255, 255, 255, 0.45);
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 8px 32px 0 rgba(255, 105, 180, 0.3),
                        inset 0 0 15px rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatBtn 3s ease-in-out infinite;
        }

        .music-toggle:hover {
            transform: scale(1.15) rotate(15deg);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 25px rgba(255, 105, 180, 0.8),
                        0 0 10px rgba(186, 85, 211, 0.6);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .music-toggle:active {
            transform: scale(0.9);
        }

        @keyframes floatBtn {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* Ensure mobile compatibility by keeping hover effects clean on touch screens */
        @media (max-width: 768px) {
            .music-toggle {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
        /* ========== PROPOSAL SCENE ========== */
        .proposal-btn {
            margin-top: 2.5rem;
            padding: 1.1rem 2.8rem;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #ff4fa3, #8b5cf6, #ff4fa3);
            background-size: 200% 200%;
            color: #fff;
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5), 0 0 60px rgba(139, 92, 246, 0.25);
            animation: proposalGlow 3s ease-in-out infinite, proposalFloat 2.5s ease-in-out infinite;
            opacity: 0;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 100;
        }

        .proposal-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: proposalShimmer 2.5s infinite;
        }

        .proposal-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 0 45px rgba(255, 105, 180, 0.7), 0 0 80px rgba(139, 92, 246, 0.4);
        }

        .proposal-btn:active {
            transform: scale(0.95);
        }

        @keyframes proposalGlow {
            0%, 100% { background-position: 0% 50%; box-shadow: 0 0 30px rgba(255, 105, 180, 0.5), 0 0 60px rgba(139, 92, 246, 0.25); }
            50% { background-position: 100% 50%; box-shadow: 0 0 50px rgba(255, 105, 180, 0.7), 0 0 80px rgba(139, 92, 246, 0.4); }
        }

        @keyframes proposalFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes proposalShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        /* YES overlay */
        .yes-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.15) 0%, rgba(0, 0, 0, 0.95) 100%);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 99999;
        }

        .yes-overlay.show {
            display: flex;
        }

        .yes-text {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff80bf, #e879f9, #7dd3fc, #ff80bf);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGradient 4s ease infinite;
            filter: drop-shadow(0 0 30px rgba(255, 105, 180, 0.8));
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .yes-sub {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.3rem;
            color: rgba(255, 182, 217, 0.7);
            margin-top: 1rem;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
        }

        .yes-ring {
            font-size: 5rem;
            margin-bottom: 1rem;
            opacity: 0;
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.6));
        }

        @media (max-width: 768px) {
            .proposal-btn {
                font-size: 1.2rem;
                padding: 0.9rem 2rem;
            }
            .yes-text {
                font-size: 2.8rem;
            }
            .yes-ring {
                font-size: 3.5rem;
            }
            .yes-sub {
                font-size: 1rem;
            }
        }

        /* ========== STARRY NIGHT SCENE ========== */
        .starry-sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .moon-container {
            position: fixed;
            top: 40px;
            right: 50px;
            width: 80px;
            height: 80px;
            z-index: 0;
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(255, 235, 175, 0.5));
            animation: floatMoon 8s ease-in-out infinite;
        }

        .moon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            box-shadow: 15px 15px 0 0 #ffeecc;
            transform: rotate(-15deg);
        }

        @keyframes floatMoon {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(-8px) rotate(-10deg); }
        }

        .floating-names {
            position: fixed;
            top: 40px;
            left: 50px;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.6), 0 0 20px rgba(139, 92, 246, 0.4);
            z-index: 1;
            animation: floatNames 6s ease-in-out infinite;
            opacity: 0.85;
            pointer-events: none;
        }

        @keyframes floatNames {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        @media (max-width: 768px) {
            .moon-container {
                top: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
            .moon {
                width: 40px;
                height: 40px;
                box-shadow: 10px 10px 0 0 #ffeecc;
            }
            .floating-names {
                font-size: 1.8rem;
                left: 20px;
                top: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Background Music Audio Tag -->
    <audio id="bgMusic" autoplay loop>
        <source src="Music/ending.mp3" type="audio/mpeg">
    </audio>

    <!-- Floating Music Button -->
    <button class="music-toggle" onclick="toggleMusic()">
        🎵
    </button>

    <canvas id="fireworks-canvas"></canvas>

    <div class="ambient-glow"></div>

    <!-- Mouse Tracking Glow Spotlight -->
    <div class="mouse-glow"></div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>

    <!-- Starry Night Scene Elements -->
    <div class="starry-sky" id="starry-sky"></div>
    <div class="moon-container">
        <div class="moon"></div>
    </div>
    <div class="floating-names">Tom 💙 Jerry</div>

    <div class="container">
        <!-- Cinematic typed messages -->
        <div class="ending-message" id="ending-message">
        </div>

        <!-- Pulser -->
        <div class="the-end" id="the-end-text">The End 🌸</div>

        <!-- Proposal Button -->
        <button class="proposal-btn" id="proposal-btn" onclick="triggerProposal()">Will You Stay With Me Forever? 💍</button>
    </div>

    <!-- YES Overlay -->
    <div class="yes-overlay" id="yes-overlay">
        <div class="yes-ring" id="yes-ring">💍</div>
        <div class="yes-text" id="yes-text">She Said YES 💖</div>
        <div class="yes-sub" id="yes-sub">Forever and always... ✨</div>
    </div>

    <script>
        // Custom spotlight glow trail follow cursor
        const cursor = document.querySelector('.custom-cursor');
        const mouseGlow = document.querySelector('.mouse-glow');

        document.addEventListener('mousemove', (e) => {
            if (mouseGlow) {
                gsap.to(mouseGlow, {
                    x: e.clientX - 150,
                    y: e.clientY - 150,
                    duration: 0.3,
                    ease: "power2.out"
                });
            }

            if (cursor) {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, .interactive, .hoverable, .cta-button, .music-toggle, [role="button"]')) {
                if (cursor) cursor.classList.add('hovered');
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('a, button, .interactive, .hoverable, .cta-button, .music-toggle, [role="button"]')) {
                if (cursor) cursor.classList.remove('hovered');
            }
        });

        // Click heart explosion particle effect completely removed

        // ====== SEQUENTIAL PARAGRAPH REVEAL ======
        const endingLines = [
            { text: "And if I had to choose again…", type: "normal" },
            { text: "in every lifetime, every universe, every possible story…", type: "normal" },
            { text: "I would still choose YOU. 💖", type: "highlight" },
            { text: "Thank you for loving me when I was hard to handle.", type: "normal" },
            { text: "Thank you for staying during my worst days.", type: "normal" },
            { text: "Thank you for becoming my peace, my happiness, and my home. 🥺✨", type: "normal" },
            { text: "No matter how much we fight, cry, laugh, or annoy each other…", type: "normal" },
            { text: "one thing will never change — my love for you. 💞", type: "highlight" },
            { text: "From random strangers… to each other's whole world. 🌎", type: "normal" },
            { text: "4 years passed like seconds with you, and honestly… I still want forever more. 💍", type: "normal" },
            { text: "One day these calls, texts, and screenshots will become real mornings, real hugs, late-night rides, and a peaceful life together. 🌙🚗💖", type: "normal" },
            { text: "Until that day comes… promise me one thing —", type: "normal" },
            { text: "Stay with me. Love me. And never stop being MY Jerry. 🥺💙", type: "highlight" },
            { text: "Once Again…", type: "normal" },
            { text: "Happy Birthday, Pondati 🎂💖", type: "highlight" },
            { text: "Forever Yours, TOM 💌", type: "sign" }
        ];

        const messageContainer = document.getElementById('ending-message');
        const theEndElement = document.getElementById('the-end-text');
        let lineIndex = 0;

        function revealNextLine() {
            if (lineIndex >= endingLines.length) {
                // All lines done — show "The End"
                setTimeout(() => {
                    gsap.to(theEndElement, {
                        opacity: 1,
                        scale: 1,
                        duration: 2.0,
                        ease: "power2.out"
                    });
                    startFinalCelebration();

                    // Show proposal button after The End
                    setTimeout(() => {
                        const proposalBtn = document.getElementById('proposal-btn');
                        gsap.to(proposalBtn, {
                            opacity: 1,
                            y: 0,
                            duration: 1.2,
                            ease: "back.out(1.7)"
                        });
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 2500);
                }, 800);
                return;
            }

            const line = endingLines[lineIndex];
            const para = document.createElement('div');
            para.className = 'ending-para';
            if (line.type === 'highlight') para.classList.add('highlight');
            if (line.type === 'sign') para.classList.add('sign');
            para.textContent = line.text;
            messageContainer.appendChild(para);

            // Fade in with GSAP
            gsap.to(para, {
                opacity: 1,
                y: 0,
                duration: 1.0,
                ease: "power2.out",
                onComplete: () => {
                    // Auto-scroll to bottom
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }
            });

            lineIndex++;

            // Delay before next line (longer for highlight lines)
            const delay = line.type === 'highlight' ? 2800 : 2200;
            setTimeout(revealNextLine, delay);
        }

        // Fireworks implementation
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let fireworks = [];

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1.0;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // gravity
                this.life -= this.decay;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color}, ${this.life})`;
                ctx.fill();
            }
        }

        class Firework {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.vy = -Math.random() * 3 - 6;
                const colors = ['255,105,180', '255,215,0', '238,130,238', '255,255,255'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.y += this.vy;
                if (this.y <= this.targetY || this.vy >= 0) {
                    this.explode();
                    return false; // dead
                }
                return true; // alive
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${this.color})`;
                ctx.fill();
            }
            explode() {
                for (let i = 0; i < 50; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        function animateFireworks() {
            ctx.fillStyle = 'rgba(8, 8, 10, 0.2)'; // trail effect
            ctx.fillRect(0, 0, width, height);

            if (Math.random() < 0.03) {
                const x = Math.random() * width;
                const targetY = Math.random() * (height / 2);
                fireworks.push(new Firework(x, targetY));
            }

            fireworks = fireworks.filter(f => {
                f.draw();
                return f.update();
            });

            particles = particles.filter(p => {
                p.draw();
                p.update();
                return p.life > 0;
            });

            requestAnimationFrame(animateFireworks);
        }
        animateFireworks();

        // Final floating elements
        function createFloatingElement() {
            const elements = ['🌸', '✨', '💖', '💕', '⭐'];
            const element = document.createElement('div');
            element.className = 'floating';
            element.textContent = elements[Math.floor(Math.random() * elements.length)];
            element.style.left = Math.random() * window.innerWidth + 'px';
            element.style.top = window.innerHeight + 10 + 'px';
            element.style.fontSize = (Math.random() * 15 + 10) + 'px';
            element.style.opacity = 0.5;
            element.style.textShadow = '0 0 5px rgba(255, 105, 180, 0.4)';
            document.body.appendChild(element);

            gsap.to(element, {
                y: -window.innerHeight - 50,
                x: '+=' + (Math.random() * 120 - 60),
                rotation: Math.random() * 360,
                duration: Math.random() * 10 + 10,
                opacity: 0,
                onComplete: () => element.remove()
            });
        }

        setInterval(createFloatingElement, 2000);

        function startFinalCelebration() {
            // Grand finale fireworks burst
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const x = (width / 5) * i + (width / 10);
                    const targetY = height / 4 + (Math.random() * 100 - 50);
                    const fw = new Firework(x, targetY);
                    fw.explode();
                }, i * 200);
            }

            // Keep launching occasional sparkle explosions near the text
            setInterval(() => {
                const x = window.innerWidth / 2 + (Math.random() - 0.5) * 350;
                const y = window.innerHeight / 2 + (Math.random() - 0.5) * 200;
                
                for (let i = 0; i < 4; i++) {
                    const spark = document.createElement('div');
                    spark.className = 'click-heart';
                    spark.innerHTML = '✨';
                    spark.style.left = x + 'px';
                    spark.style.top = y + 'px';
                    document.body.appendChild(spark);

                    gsap.to(spark, {
                        y: y - 50 - Math.random() * 50,
                        x: x + (Math.random() - 0.5) * 100,
                        opacity: 0,
                        scale: Math.random() * 0.6 + 0.3,
                        duration: 1 + Math.random() * 0.5,
                        onComplete: () => spark.remove()
                    });
                }
            }, 3000);
        }

        // ====== MUSIC ======
        window.addEventListener("click", () => {
            const music = document.getElementById("bgMusic");
            if (music && music.paused) {
                music.volume = 0;
                music.play().catch(e => console.log(e));
            }
        }, { once: true });

        window.toggleMusic = function() {
            const music = document.getElementById("bgMusic");
            if (music) {
                if (music.paused) {
                    music.volume = 0;
                    music.play().catch(e => console.log(e));
                } else {
                    music.pause();
                }
            }
        }

        // Initialize typing, starry sky and background music on page load
        window.addEventListener('load', () => {
            initStarrySky();

            // Delay reveal start slightly for dramatic entry
            setTimeout(revealNextLine, 1200);

            const audio = document.getElementById('bgMusic');
            if (audio) {
                audio.volume = 0;
                audio.addEventListener('play', () => {
                    gsap.to(audio, { volume: 0.4, duration: 1.5, ease: "power1.out" });
                });
                audio.play().catch(err => {
                    console.log("Autoplay blocked, waiting for user click.");
                });
            }
        });

        // ====== STARRY SKY GENERATOR ======
        function initStarrySky() {
            const sky = document.getElementById('starry-sky');
            if (!sky) return;
            const starCount = window.innerWidth < 768 ? 60 : 120;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1; // 1px to 3px
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                const duration = Math.random() * 3 + 2; // 2s to 5s
                const delay = Math.random() * 5;
                star.style.animation = `twinkle ${duration}s ease-in-out infinite`;
                star.style.animationDelay = `${delay}s`;
                
                sky.appendChild(star);
            }
        }
        // ====== PROPOSAL SCENE ======
        function triggerProposal() {
            const proposalBtn = document.getElementById('proposal-btn');
            const overlay = document.getElementById('yes-overlay');
            const yesRing = document.getElementById('yes-ring');
            const yesText = document.getElementById('yes-text');
            const yesSub = document.getElementById('yes-sub');

            // Fade out the button
            gsap.to(proposalBtn, {
                opacity: 0,
                scale: 0.8,
                duration: 0.4,
                onComplete: () => { proposalBtn.style.display = 'none'; }
            });

            // Massive fireworks burst
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const x = Math.random() * width;
                    const targetY = Math.random() * (height * 0.6);
                    const fw = new Firework(x, targetY);
                    fw.explode();
                }, i * 150);
            }

            // Show YES overlay
            setTimeout(() => {
                overlay.classList.add('show');

                // Animate ring
                gsap.to(yesRing, {
                    opacity: 1,
                    duration: 1,
                    ease: "power2.out"
                });

                // Animate YES text
                gsap.to(yesText, {
                    opacity: 1,
                    scale: 1,
                    duration: 1.5,
                    delay: 0.5,
                    ease: "back.out(1.7)"
                });

                // Animate subtitle
                gsap.to(yesSub, {
                    opacity: 1,
                    duration: 1,
                    delay: 1.5,
                    ease: "power2.out"
                });

                // Keep spawning fireworks in the overlay
                const celebInterval = setInterval(() => {
                    for (let i = 0; i < 3; i++) {
                        const x = Math.random() * width;
                        const targetY = Math.random() * (height * 0.5);
                        const fw = new Firework(x, targetY);
                        fw.explode();
                    }
                }, 1500);

                // Spawn celebration hearts
                const heartInterval = setInterval(() => {
                    const h = document.createElement('div');
                    h.className = 'click-heart';
                    h.innerHTML = ['💖', '💍', '💕', '✨', '💗'][Math.floor(Math.random() * 5)];
                    h.style.left = Math.random() * 100 + 'vw';
                    h.style.top = window.innerHeight + 10 + 'px';
                    h.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    document.body.appendChild(h);
                    gsap.to(h, {
                        y: -(window.innerHeight + 50),
                        x: (Math.random() - 0.5) * 100,
                        opacity: 0,
                        duration: 4 + Math.random() * 3,
                        ease: "power1.out",
                        onComplete: () => h.remove()
                    });
                }, 300);
            }, 800);
        }

    </script>

    <script src="secret-messages.js"></script>
</body>
