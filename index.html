<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story Begins Soon 💖</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Immediate check — if already unlocked or past date, skip lock screen
        (function() {
            const unlockDate = new Date("May 26, 2026 00:00:00").getTime();
            const now = new Date().getTime();
            const isUnlocked = localStorage.getItem('birthday_unlocked') === 'true';
            if (now >= unlockDate || isUnlocked) {
                window.location.replace("start.html");
            }
        })();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Outfit:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0118 0%, #120826 30%, #1a0a2e 60%, #0d0618 100%);
            background-size: 400% 400%;
            animation: darkGradientShift 20s ease infinite;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #fff;
        }

        @keyframes darkGradientShift {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 50% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 100%; }
        }

        /* ========== CUSTOM CURSOR ========== */
        .custom-cursor {
            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff4fd8, #8f5bff);
            box-shadow: 0 0 20px #ff4fd8;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10000;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1), background 0.3s;
            animation: cursorPulse 2s infinite ease-in-out;
        }

        @keyframes cursorPulse {
            0%, 100% { box-shadow: 0 0 15px #ff4fd8, 0 0 5px #8f5bff; }
            50% { box-shadow: 0 0 30px #ff4fd8, 0 0 15px #8f5bff; }
        }

        .custom-cursor.hovered {
            transform: translate(-50%, -50%) scale(1.6);
            background: linear-gradient(45deg, #8f5bff, #ff4fd8);
            box-shadow: 0 0 35px #8f5bff, 0 0 15px #ff4fd8;
        }

        .mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 79, 216, 0.12) 0%, rgba(143, 91, 255, 0.06) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
            will-change: transform;
        }

        /* ========== AMBIENT GLOW BLOBS ========== */
        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .blob-1 {
            top: -15%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 79, 216, 0.5) 0%, transparent 70%);
            animation: blobDrift1 18s ease-in-out infinite;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(143, 91, 255, 0.4) 0%, transparent 70%);
            animation: blobDrift2 22s ease-in-out infinite;
        }

        .blob-3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.3) 0%, transparent 70%);
            animation: blobDrift3 15s ease-in-out infinite;
        }

        @keyframes blobDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, 40px) scale(1.15); }
            66% { transform: translate(-30px, -20px) scale(0.9); }
        }

        @keyframes blobDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-80px, -50px) scale(1.1); }
        }

        @keyframes blobDrift3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.25); }
        }

        /* ========== LOCK SCREEN CONTAINER ========== */
        .lock-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
            max-width: 560px;
            width: 92%;
            padding: 2.5rem 2rem;
        }

        /* ========== GLOWING LOCK ICON ========== */
        .lock-icon-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-icon-glow {
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 79, 216, 0.35) 0%, transparent 70%);
            animation: lockGlowPulse 2.5s ease-in-out infinite;
        }

        @keyframes lockGlowPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
        }

        .lock-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 20px rgba(255, 79, 216, 0.7)) drop-shadow(0 0 40px rgba(143, 91, 255, 0.5));
            animation: heartbeat 1.8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        /* ========== TITLE ========== */
        .lock-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #ff80bf, #e879f9, #c084fc, #ff80bf);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGradient 6s ease infinite;
            filter: drop-shadow(0 0 15px rgba(255, 128, 191, 0.4));
            line-height: 1.3;
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* ========== TYPING TEXT ========== */
        .typing-container {
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 1.05rem;
            font-weight: 500;
            color: rgba(255, 182, 217, 0.7);
            letter-spacing: 0.5px;
        }

        .typing-caret {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: linear-gradient(180deg, #ff4fd8, #8f5bff);
            margin-left: 3px;
            animation: caretBlink 0.8s ease-in-out infinite;
            vertical-align: text-bottom;
        }

        @keyframes caretBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ========== COUNTDOWN ========== */
        .countdown-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .count-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 1.2rem 1rem;
            min-width: 90px;
            text-align: center;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 20px rgba(255, 79, 216, 0.08);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .count-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            animation: cardShimmer 4s infinite ease-in-out;
        }

        @keyframes cardShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .count-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15),
                0 0 30px rgba(255, 79, 216, 0.15);
        }

        .count-value {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff80bf, #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            display: block;
            filter: drop-shadow(0 0 8px rgba(255, 128, 191, 0.3));
        }

        .count-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 182, 217, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            display: block;
        }

        /* ========== SECRET CODE INPUT ========== */
        .secret-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 340px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .secret-input {
            width: 100%;
            padding: 1rem 1.4rem;
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: center;
        }

        .secret-input::placeholder {
            color: rgba(255, 182, 217, 0.35);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .secret-input:focus {
            border-color: rgba(255, 79, 216, 0.5);
            box-shadow: 0 0 25px rgba(255, 79, 216, 0.15), inset 0 0 10px rgba(255, 79, 216, 0.05);
            background: rgba(255, 255, 255, 0.09);
        }

        .secret-input.error {
            border-color: rgba(255, 80, 100, 0.6);
            box-shadow: 0 0 25px rgba(255, 80, 100, 0.2);
            animation: inputShake 0.5s ease;
        }

        @keyframes inputShake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-8px); }
            30% { transform: translateX(8px); }
            45% { transform: translateX(-6px); }
            60% { transform: translateX(6px); }
            75% { transform: translateX(-3px); }
            90% { transform: translateX(3px); }
        }

        .error-msg {
            font-size: 0.85rem;
            color: rgba(255, 100, 120, 0.9);
            font-weight: 500;
            min-height: 1.2rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-msg.visible {
            opacity: 1;
        }

        .unlock-btn {
            padding: 0.9rem 2.8rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff4fd8, #8f5bff);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 6px 25px rgba(255, 79, 216, 0.35),
                0 0 15px rgba(143, 91, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            animation: btnFloat 3s ease-in-out infinite;
        }

        @keyframes btnFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .unlock-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }

        .unlock-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow:
                0 10px 35px rgba(255, 79, 216, 0.5),
                0 0 25px rgba(143, 91, 255, 0.35);
        }

        .unlock-btn:hover::before {
            left: 100%;
        }

        .unlock-btn:active {
            transform: scale(0.96);
        }

        /* ========== FLOATING HEARTS & SPARKLES ========== */
        .floating-heart, .floating-sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            will-change: transform, opacity;
        }

        .floating-heart {
            font-size: 1.2rem;
            opacity: 0.3;
        }

        .floating-sparkle {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.2;
        }

        /* ========== MUSIC TOGGLE ========== */
        .music-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 15px rgba(255, 79, 216, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: floatBtn 3s ease-in-out infinite;
        }

        @keyframes floatBtn {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .music-toggle:hover {
            transform: scale(1.15) rotate(15deg);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px rgba(255, 79, 216, 0.4), 0 0 10px rgba(143, 91, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .music-toggle:active {
            transform: scale(0.9);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            * {
                cursor: auto !important;
            }
            .custom-cursor, .mouse-glow {
                display: none !important;
            }
            .music-toggle {
                bottom: 20px;
                right: 20px;
                width: 48px;
                height: 48px;
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .lock-title {
                font-size: 2rem;
            }
            .count-card {
                min-width: 72px;
                padding: 0.9rem 0.7rem;
                border-radius: 16px;
            }
            .count-value {
                font-size: 2rem;
            }
            .count-label {
                font-size: 0.65rem;
            }
            .countdown-row {
                gap: 0.6rem;
            }
            .lock-container {
                gap: 1.4rem;
                padding: 1.5rem 1rem;
            }
            .lock-icon {
                font-size: 3rem;
            }
            .lock-icon-wrapper {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
        <source src="Music/start.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Toggle -->
    <button class="music-toggle" onclick="toggleMusic()">
        🎵
    </button>

    <!-- Ambient Blobs -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <!-- Mouse Glow & Cursor -->
    <div class="mouse-glow"></div>
    <div class="custom-cursor"></div>

    <!-- Lock Screen Content -->
    <div class="lock-container">

        <!-- Glowing Lock Icon -->
        <div class="lock-icon-wrapper">
            <div class="lock-icon-glow"></div>
            <div class="lock-icon">🔒</div>
        </div>

        <!-- Title -->
        <h1 class="lock-title">Our Love Story Begins Soon 💖</h1>

        <!-- Typing Animation -->
        <div class="typing-container">
            <span class="typing-text" id="typingText"></span>
            <span class="typing-caret"></span>
        </div>

        <!-- Countdown Timer -->
        <div class="countdown-row" id="countdown">
            <div class="count-card"><span class="count-value">--</span><span class="count-label">Days</span></div>
            <div class="count-card"><span class="count-value">--</span><span class="count-label">Hours</span></div>
            <div class="count-card"><span class="count-value">--</span><span class="count-label">Mins</span></div>
            <div class="count-card"><span class="count-value">--</span><span class="count-label">Secs</span></div>
        </div>

        <!-- Secret Code Form -->
        <div class="secret-form">
            <div class="input-wrapper">
                <input
                    type="password"
                    class="secret-input"
                    id="secretCode"
                    placeholder="Enter Secret Code 💌"
                    autocomplete="off"
                    spellcheck="false"
                >
            </div>
            <div class="error-msg" id="errorMsg">Wrong Secret Code 💔</div>
            <button class="unlock-btn" onclick="checkSecretCode()">
                Unlock 💖
            </button>
        </div>

    </div>

    <script>
        // ====== COUNTDOWN TIMER ======
        const unlockDate = new Date("May 26, 2026 00:00:00").getTime();

        function padZero(n) {
            return n < 10 ? '0' + n : n;
        }

        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = unlockDate - now;

            if (distance < 0) {
                clearInterval(timer);
                localStorage.setItem('birthday_unlocked', 'true');
                unlockAndGo();
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdownEl.innerHTML = `
                <div class="count-card"><span class="count-value">${padZero(days)}</span><span class="count-label">Days</span></div>
                <div class="count-card"><span class="count-value">${padZero(hours)}</span><span class="count-label">Hours</span></div>
                <div class="count-card"><span class="count-value">${padZero(minutes)}</span><span class="count-label">Mins</span></div>
                <div class="count-card"><span class="count-value">${padZero(seconds)}</span><span class="count-label">Secs</span></div>
            `;
        }, 1000);

        // ====== UNLOCK TRANSITION ======
        function unlockAndGo() {
            // Burst of hearts
            for (let i = 0; i < 20; i++) {
                spawnFloatingHeart();
            }

            gsap.to('.lock-container', {
                scale: 0.9,
                opacity: 0,
                y: -30,
                duration: 0.8,
                ease: "power2.inOut"
            });

            gsap.to('body', {
                opacity: 0,
                duration: 1.4,
                delay: 0.5,
                ease: "power3.inOut",
                onComplete: () => {
                    window.location.href = "start.html";
                }
            });
        }

        // ====== SECRET CODE ======
        function checkSecretCode() {
            const input = document.getElementById('secretCode');
            const code = input.value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (code.toLowerCase() === 'jerry') {
                localStorage.setItem('birthday_unlocked', 'true');
                input.style.borderColor = 'rgba(100, 255, 150, 0.6)';
                input.style.boxShadow = '0 0 25px rgba(100, 255, 150, 0.2)';
                errorMsg.classList.remove('visible');
                unlockAndGo();
            } else {
                input.classList.add('error');
                errorMsg.classList.add('visible');

                setTimeout(() => {
                    input.classList.remove('error');
                }, 600);

                setTimeout(() => {
                    errorMsg.classList.remove('visible');
                }, 2500);
            }
        }

        // Enter key support
        document.getElementById('secretCode').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkSecretCode();
            }
        });

        // ====== TYPING ANIMATION ======
        const typingPhrases = [
            "Waiting for our special day 💖",
            "Something magical is coming ✨",
            "Counting every second for you 💕",
            "A surprise made with love 🌹",
            "Just a little more patience, baby 💌"
        ];

        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        const typingEl = document.getElementById('typingText');

        function typeEffect() {
            const currentPhrase = typingPhrases[phraseIndex];

            if (!isDeleting) {
                typingEl.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;

                if (charIndex === currentPhrase.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, 2200); // Pause before deleting
                    return;
                }
                setTimeout(typeEffect, 65);
            } else {
                typingEl.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;

                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % typingPhrases.length;
                    setTimeout(typeEffect, 400);
                    return;
                }
                setTimeout(typeEffect, 35);
            }
        }

        typeEffect();

        // ====== FLOATING HEARTS ======
        const heartEmojis = ['💖', '💕', '💗', '💘', '💝', '🩷', '✨', '🌸'];

        function spawnFloatingHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = window.innerHeight + 20 + 'px';
            heart.style.fontSize = (Math.random() * 14 + 10) + 'px';
            document.body.appendChild(heart);

            gsap.to(heart, {
                y: -(window.innerHeight + 80),
                x: (Math.random() - 0.5) * 200,
                rotation: (Math.random() - 0.5) * 60,
                opacity: 0,
                duration: 6 + Math.random() * 5,
                ease: "power1.out",
                onComplete: () => heart.remove()
            });
        }

        setInterval(spawnFloatingHeart, 1400);

        // ====== FLOATING SPARKLES ======
        function spawnSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'floating-sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';

            const size = Math.random() * 3 + 1;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.opacity = Math.random() * 0.4 + 0.1;
            document.body.appendChild(sparkle);

            gsap.to(sparkle, {
                y: '-=80',
                x: (Math.random() - 0.5) * 40,
                opacity: 0,
                duration: 4 + Math.random() * 3,
                ease: "sine.inOut",
                onComplete: () => sparkle.remove()
            });
        }

        // Initial batch
        for (let i = 0; i < 15; i++) { spawnSparkle(); }
        setInterval(spawnSparkle, 800);

        // ====== CURSOR ======
        const cursor = document.querySelector('.custom-cursor');
        const mouseGlow = document.querySelector('.mouse-glow');

        document.addEventListener('mousemove', (e) => {
            if (mouseGlow) {
                gsap.to(mouseGlow, {
                    x: e.clientX - 200,
                    y: e.clientY - 200,
                    duration: 0.3,
                    ease: "power2.out"
                });
            }
            if (cursor) {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, input, .interactive, .hoverable, .music-toggle, [role="button"]')) {
                if (cursor) cursor.classList.add('hovered');
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('a, button, input, .interactive, .hoverable, .music-toggle, [role="button"]')) {
                if (cursor) cursor.classList.remove('hovered');
            }
        });

        // ====== MUSIC ======
        window.addEventListener("click", () => {
            const music = document.getElementById("bgMusic");
            if (music) {
                music.volume = 0.2;
                music.play().catch(e => console.log(e));
            }
        }, { once: true });

        function toggleMusic() {
            const music = document.getElementById("bgMusic");
            if (music) {
                if (music.paused) {
                    music.volume = 0.2;
                    music.play().catch(e => console.log(e));
                } else {
                    music.pause();
                }
            }
        }

        window.addEventListener('load', () => {
            const audio = document.getElementById('bgMusic');
            if (audio) {
                audio.volume = 0.2;
                audio.play().catch(() => {
                    console.log("Autoplay blocked, waiting for user click.");
                });
            }

            // Entrance animation
            gsap.from('.lock-icon-wrapper', { scale: 0, rotation: -30, duration: 1, ease: "back.out(1.7)", delay: 0.2 });
            gsap.from('.lock-title', { y: 30, opacity: 0, duration: 0.8, ease: "power2.out", delay: 0.5 });
            gsap.from('.typing-container', { y: 20, opacity: 0, duration: 0.6, ease: "power2.out", delay: 0.7 });
            gsap.from('.countdown-row', { y: 40, opacity: 0, duration: 0.8, ease: "power2.out", delay: 0.9 });
            gsap.from('.secret-form', { y: 40, opacity: 0, duration: 0.8, ease: "power2.out", delay: 1.1 });
        });
    </script>
</body>
</html>
