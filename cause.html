<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>(function(){var u=new Date("May 26, 2026 00:00:00").getTime();if(Date.now()>=u)return;if(location.search.indexOf('access=true')>-1){history.replaceState(null,'',location.pathname);window._a=true;return;}location.replace("index.html");})();</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why You're My Best Friend! 💖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="./cause.css">
    <style>
        /* ====== RAIN WEATHER EFFECT ====== */
        .rain-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            top: -20px;
            width: 2px;
            background: linear-gradient(180deg, transparent, rgba(174, 194, 255, 0.35));
            border-radius: 0 0 2px 2px;
            animation: rainFall linear infinite;
        }

        @keyframes rainFall {
            0% { transform: translateY(-20px); opacity: 0.7; }
            80% { opacity: 0.4; }
            100% { transform: translateY(105vh); opacity: 0; }
        }

        .pink-particle {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            border-radius: 50%;
            filter: blur(1px);
        }
    </style>
</head>

<body>
    <!-- Background Music Audio Tag -->
    <audio id="bgMusic" autoplay loop>
        <source src="Music/cause.mp3" type="audio/mpeg">
    </audio>

    <!-- Floating Music Button -->
    <button class="music-toggle" onclick="toggleMusic()">
        🎵
    </button>

    <!-- Mouse Tracking Glow Spotlight -->
    <div class="mouse-glow"></div>

    <div class="custom-cursor">
        <svg viewBox="0 0 24 24">
            <path fill="#ff69b4"
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
    </div>

    <div class="container">
        <h1>Happy Birthday AnuSri 💖</h1>

        <div id="reasons-container"></div>

        <button class="shuffle-button">Click Here... 💕</button>
        <div class="reason-counter"></div>

        <div class="ending-section">
            <div class="teddy-hug">
                <img src="Image/d1.png" alt="Teddy Hug">
            </div>
            <div class="ending-text">You're the BESTEST ! 💖</div>
        </div>
    </div>

    <!-- Cute Meme Popup Card -->
    <div class="meme-popup" id="meme-popup" style="display: none;">
        <span class="close-meme" id="close-meme">&times;</span>
        <div class="meme-content">
            <img src="gifs/gif1.gif" id="meme-img" alt="Cute Meme Reaction">
            <p id="meme-caption">Me after your one text 😭💖</p>
        </div>
    </div>

    <!-- Rain Weather Effect -->
    <div class="rain-container" id="rain-container"></div>

    <!-- Floating Romantic GIF Popup -->
    <div class="gif-popup">
        <img id="popupGif" src="gifs/gif1.gif" alt="Romantic GIF">
    </div>

    <script src="cause.js"></script>

    <script>
        // ====== FLOATING GIF POPUP AUTO-SHUFFLE ======
        const popupGifs = [
            "gifs/gif1.gif",
            "gifs/gif2.gif",
            "gifs/gif3.gif",
            "gifs/gif4.gif",
            "gifs/gif5.gif",
            "gifs/gif6.gif",
            "gifs/gif7.gif",
            "gifs/gif8.gif",
            "gifs/gif9.gif",
            "gifs/gif10.gif",
            "gifs/gif11.gif",
            "gifs/gif12.gif"
        ];

        const popupGif = document.getElementById("popupGif");
        let lastPopupGifIndex = 0;

        function changePopupGif() {
            let index = Math.floor(Math.random() * popupGifs.length);
            while (index === lastPopupGifIndex && popupGifs.length > 1) {
                index = Math.floor(Math.random() * popupGifs.length);
            }
            lastPopupGifIndex = index;

            popupGif.style.opacity = "0";

            setTimeout(() => {
                popupGif.src = popupGifs[index];
                popupGif.style.opacity = "1";
            }, 400);
        }

        setInterval(changePopupGif, 3000);

        // ====== RAIN EFFECT ======
        const rainContainer = document.getElementById('rain-container');
        function createRain() {
            for (let i = 0; i < 80; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.height = (Math.random() * 18 + 10) + 'px';
                drop.style.animationDuration = (Math.random() * 0.8 + 0.6) + 's';
                drop.style.animationDelay = (Math.random() * 2) + 's';
                drop.style.opacity = Math.random() * 0.4 + 0.2;
                rainContainer.appendChild(drop);
            }
        }
        createRain();

        // ====== FLOATING PINK PARTICLES ======
        function spawnPinkParticle() {
            const p = document.createElement('div');
            p.className = 'pink-particle';
            const size = Math.random() * 6 + 3;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            const hue = Math.random() > 0.5 ? 'rgba(255,105,180,0.5)' : 'rgba(255,182,193,0.6)';
            p.style.background = hue;
            p.style.boxShadow = '0 0 8px ' + hue;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = window.innerHeight + 10 + 'px';
            document.body.appendChild(p);

            gsap.to(p, {
                y: -(window.innerHeight + 50),
                x: (Math.random() - 0.5) * 150,
                opacity: 0,
                duration: 5 + Math.random() * 4,
                ease: "power1.out",
                onComplete: () => p.remove()
            });
        }
        setInterval(spawnPinkParticle, 600);
    </script>

    <link rel="stylesheet" href="secret-messages.css">
    <script src="secret-messages.js"></script>
</body>

</html>
