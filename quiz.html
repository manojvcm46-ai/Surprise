        * {

            min-height: 100vh;

            position: fixed;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff4fd8, #8f5bff);
            box-shadow: 0 0 20px #ff4fd8;

            transform: translate(-50%, -50%);
            z-index: 10000;
            transition: transform 0.1s cubic-bezier(0.25, 1, 0.5, 1), background 0.3s;
            animation: cursorPulse 2s infinite ease-in-out;
        }

        @keyframes cursorPulse {
            0%, 100% {
                box-shadow: 0 0 15px #ff4fd8, 0 0 5px #8f5bff;
            }
            50% {
                box-shadow: 0 0 30px #ff4fd8, 0 0 15px #8f5bff;
            }

        .custom-cursor.hovered {
            transform: translate(-50%, -50%) scale(1.6);
            background: linear-gradient(45deg, #8f5bff, #ff4fd8);
            box-shadow: 0 0 35px #8f5bff, 0 0 15px #ff4fd8;
        }

        .mouse-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.15) 0%, rgba(255, 105, 180, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
            will-change: transform;

        .ambient-blobs {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            mix-blend-mode: multiply;
            animation: blobFloat 20s ease-in-out infinite;
        }

        .blob-1 {
            top: -5%;
            left: 5%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.35) 0%, transparent 70%);
        }

        .blob-2 {
            bottom: -10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(186, 85, 211, 0.3) 0%, transparent 75%);
            animation-delay: -5s;

            width: 300px;
            height: 300px;

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }

            animation: shimmerProgress 2s linear infinite;

        .progress-bar-fill::after {
            content: '';

            top: 0;
            right: 0;
            width: 20px;

        .option-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 105, 180, 0.08);
            border-radius: 50%;
            transform: translate(-50%, -50%);

        .option-btn:hover {

            border-color: rgba(255, 105, 180, 0.4);
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.15), 0 0 15px rgba(255, 105, 180, 0.08);
        }

        .option-btn:hover::before {
            width: 250px;
            height: 250px;
        }

        .option-btn:active {
            transform: scale(0.97);
        }

        /* Option Label */
        .option-label {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff69b4, #c084fc);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 0.4rem;
            text-align: center;
            flex-shrink: 0;
        }

        /* Correct Answer */
        .option-btn.correct {
            border-color: #4caf50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.15), rgba(129, 199, 132, 0.1));
            color: #2e7d32;
            transform: scale(1.04);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.25), 0 8px 25px rgba(76, 175, 80, 0.15);
            animation: correctPulse 0.6s ease;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1.04); }
        }

        /* Wrong Answer */
        .option-btn.wrong {
            border-color: #ff7043;
            background: linear-gradient(135deg, rgba(255, 112, 67, 0.1), rgba(255, 138, 101, 0.08));
            color: #bf360c;
            animation: shakeWrong 0.5s ease;
        }

        @keyframes shakeWrong {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px) rotate(-1deg); }
            40% { transform: translateX(10px) rotate(1deg); }
            60% { transform: translateX(-6px) rotate(-0.5deg); }
            80% { transform: translateX(6px) rotate(0.5deg); }
        }

        .option-btn.disabled {
            pointer-events: none;
            opacity: 0.55;
        }

        .option-btn.highlight-correct {
            border-color: #4caf50;
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.18), rgba(129, 199, 132, 0.12));
            color: #2e7d32;
            opacity: 1 !important;
        }

        /* Feedback Message */
        .feedback {
            margin-top: 1.3rem;
            font-size: 1.1rem;
            font-weight: 700;
            opacity: 0;
            transform: translateY(10px);
            position: relative;
            z-index: 1;
        }

        .feedback-correct {
            color: #2e7d32;
            font-family: 'Dancing Script', cursive;
            font-size: 1.3rem;
        }

        .feedback-wrong {
            color: #e65100;
            font-family: 'Comic Neue', cursive;
        }

        /* Sad Cat Meme (for wrong answers) */
        .sad-cat {
            font-size: 2.5rem;
            margin-top: 0.5rem;
            display: block;
            animation: sadBounce 0.8s ease;
        }

        @keyframes sadBounce {
            0% { transform: scale(0) rotate(-20deg); }
            50% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .result-card {
            display: none;
            text-align: center;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7), rgba(255, 240, 245, 0.45));
            backdrop-filter: blur(25px);

            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.6);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff69b4, #c084fc);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.35), inset 0 0 15px rgba(255, 255, 255, 0.3);

        }

        .score-circle::after {
            content: '';
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.4);
        }

        .score-text {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .result-emoji {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 0.8rem;
            animation: emojiFloat 2.5s ease-in-out infinite;
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: #d6336c;
            margin-bottom: 0.8rem;
        }

        .result-message {
            font-family: 'Dancing Script', cursive;
            font-size: 1.25rem;
            color: #7a5a68;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        /* CTA Button */
        .cta-button {
            background: linear-gradient(45deg, #ff69b4, #da70d6);

            background: linear-gradient(45deg, #da70d6, #c084fc);
        }

        @keyframes bounceButton {
            0%, 100% { transform: translateY(0); }

        .floating {
            position: fixed;
            pointer-events: none;

            height: 10px;
            border-radius: 2px;
        }

        /* Keyframes */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ========== MEDIA QUERIES ========== */
        @media (max-width: 768px) {
            * {
                cursor: auto !important;
            }

            .custom-cursor, .mouse-glow {
                display: none !important;
            }

            .quiz-header h1 {
                font-size: 1.9rem;
            }

            .quiz-header p {
                font-size: 1.1rem;

        @media (max-width: 480px) {

                padding: 2rem 1.5rem;

                padding: 0.8rem 2rem;

        /* Premium Glassmorphism Music Toggle Button */
        .music-toggle {

            bottom: 30px;

            }
        }

        /* Ensure mobile compatibility by keeping hover effects clean on touch screens */
        @media (max-width: 768px) {
            .music-toggle {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
    </style>
</head>

                correct: 0
            },
            {
                emoji: "💍",
                question: "Nee ennaku propose panna day? 💍",
                options: ["May 01 2022", "May 10 2022", "May 15 2022", "May 20 2022"],
                correct: 2
            },
            {
                emoji: "🥺",
                question: "Ennaku nee koopudurathula podicha word? 🥺",
                options: ["Chello", "Pattu", "Mama", "Thangoo"],
                correct: 2
            },
            {
                emoji: "🎬",
                question: "Namma 1st poona movie date name? 🎬🍿",
                options: ["Thangalaan", "Cobra", "Garudan", "Alien"],
                correct: 0
            },
            {
                emoji: "📸",
                question: "Namma last ya pic edutha place inga? 📸",
                options: ["Theatre", "Temple", "Railway Station", "Main Road"],
                correct: 0
            }
        ];

        const optionLabels = ['A', 'B', 'C', 'D'];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        const questionCard = document.getElementById('question-card');
        const resultCard = document.getElementById('result-card');
        const progressFill = document.getElementById('progress-fill');
        const liveScoreEl = document.getElementById('live-score');

        // ====== RENDER QUESTION ======
        function renderQuestion() {
            answered = false;
            const q = quizData[currentQuestion];
            progressFill.style.width = ((currentQuestion) / quizData.length * 100) + '%';

            questionCard.innerHTML = `
                <span class="question-number">✨ Question ${currentQuestion + 1} of ${quizData.length}</span>
                <span class="question-emoji">${q.emoji}</span>
                <p class="question-text">${q.question}</p>
                <div class="options-grid">
                    ${q.options.map((opt, i) => `
                        <button class="option-btn" onclick="selectAnswer(${i})">
                            <span class="option-label">${optionLabels[i]}</span>
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="feedback" id="feedback"></div>
            `;

            // Animate card entrance
            gsap.fromTo(questionCard,
                { opacity: 0, y: 40, scale: 0.95 },
                { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "back.out(1.4)" }
            );
        }

        // ====== SELECT ANSWER ======
        function selectAnswer(index) {
            if (answered) return;
            answered = true;

            const q = quizData[currentQuestion];
            const buttons = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedback');
            const isCorrect = index === q.correct;

            // Disable all buttons
            buttons.forEach(btn => btn.classList.add('disabled'));

            if (isCorrect) {
                score++;
                liveScoreEl.textContent = score;
                buttons[index].classList.add('correct');
                feedback.className = 'feedback feedback-correct';
                feedback.innerHTML = '✅ Yesss! You know it pookie! 💖';

                // Heart explosion celebration!
                launchHeartExplosion();
                launchConfetti();

                // Pulse the score counter
                gsap.fromTo('.score-counter', { scale: 1 }, { scale: 1.15, duration: 0.2, yoyo: true, repeat: 1 });
            } else {
                buttons[index].classList.add('wrong');
                buttons[q.correct].classList.add('highlight-correct');
                feedback.className = 'feedback feedback-wrong';
                feedback.innerHTML = `Ayyooo wrong da! 😭 <span class="sad-cat">😿</span>`;
            }

            // Show feedback
            gsap.to(feedback, { opacity: 1, y: 0, duration: 0.5, ease: "back.out" });

            // Auto-advance after delay
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    gsap.to(questionCard, {
                        opacity: 0,
                        x: -60,
                        duration: 0.4,
                        ease: "power2.in",
                        onComplete: () => {
                            gsap.set(questionCard, { x: 0 });
                            renderQuestion();
                        }
                    });
                } else {
                    showResult();
                }
            }, 2000);
        }

        // ====== SHOW RESULT ======
        function showResult() {
            progressFill.style.width = '100%';

            gsap.to(questionCard, {
                opacity: 0,
                scale: 0.9,
                duration: 0.5,
                onComplete: () => {
                    questionCard.style.display = 'none';
                    resultCard.style.display = 'block';

                    document.getElementById('score-text').textContent = `${score}/${quizData.length}`;

                    let emoji, title, message;

                    if (score >= 5) {
                        emoji = '😭💖';
                        title = "You really know our love story 😭💖";
                        message = "I can't believe you remember everything... you're literally my soulmate forever and ever 💕 Every moment with you is the most precious thing in my world.";
                    } else if (score >= 4) {
                        emoji = '🥹💖';
                        title = "Almost Perfect Pookie! 🌸";
                        message = "You know me so well... just one tiny miss but it's okay, my heart still belongs to you completely 💖 We have forever to learn more.";
                    } else if (score >= 3) {
                        emoji = '😌💕';
                        title = "Not Bad Cutieee! 😌";
                        message = "You know the important stuff... but we need more late night calls to fix the rest 📞💕 I'll quiz you again soon!";
                    } else if (score >= 2) {
                        emoji = '🤨😂';
                        title = "Hmm Suspicious... 🤔";
                        message = "Are you really paying attention when I talk da?! 😤💔 More listening, less sleeping on calls!";
                    } else {
                        emoji = '😭😂';
                        title = "Ayyooo fake lover detected 😭😂";
                        message = "You literally know nothing about us! 🥲 I'm taking your boyfriend card away RIGHT NOW! Study our love story tonight or else... 😤💖";
                    }

                    document.getElementById('result-emoji').textContent = emoji;
                    document.getElementById('result-title').textContent = title;
                    document.getElementById('result-message').textContent = message;

                    gsap.from(resultCard, {
                        opacity: 0,
                        scale: 0.8,
                        y: 30,
                        duration: 0.8,
                        ease: "back.out(1.4)"
                    });

                    // Mega celebration
                    for (let i = 0; i < 4; i++) {
                        setTimeout(launchConfetti, i * 350);
                    }
                }
            });
        }

        // ====== HEART EXPLOSION ======
        function launchHeartExplosion() {
            const hearts = ['💖', '💕', '💗', '💓', '💝', '✨', '🌸', '💫'];
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'click-heart';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = centerX + 'px';
                heart.style.top = centerY + 'px';
                heart.style.fontSize = (Math.random() * 18 + 14) + 'px';
                document.body.appendChild(heart);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 250 + 100;

                gsap.to(heart, {
                    x: Math.cos(angle) * velocity,
                    y: Math.sin(angle) * velocity - 50,
                    rotation: Math.random() * 360,
                    opacity: 0,
                    scale: Math.random() * 0.6 + 0.5,
                    duration: 1.2 + Math.random() * 0.5,
                    ease: "power2.out",
                    onComplete: () => heart.remove()
                });
            }
        }

        // ====== CONFETTI ======
        function launchConfetti() {
            const colors = ['#ff69b4', '#da70d6', '#c084fc', '#ffeb3b', '#4caf50', '#ff9800', '#e91e63'];
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for (let i = 0; i < 35; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = centerX + 'px';
                confetti.style.top = centerY + 'px';
                confetti.style.width = (Math.random() * 8 + 5) + 'px';
                confetti.style.height = (Math.random() * 8 + 5) + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                document.body.appendChild(confetti);

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 300 + 120;

                gsap.to(confetti, {
                    x: Math.cos(angle) * velocity,
                    y: Math.sin(angle) * velocity + 150,
                    rotation: Math.random() * 720 - 360,
                    opacity: 0,
                    duration: 1.5 + Math.random(),
                    ease: "power2.out",
                    onComplete: () => confetti.remove()
                });
            }
        }

        // ====== CLICK HEARTS REMOVED ======

        // ====== FLOATING ELEMENTS ======
        function createFloatingElement() {
            const elements = ['🌸', '✨', '💖', '💕', '⭐', '💫'];
            const el = document.createElement('div');
            el.className = 'floating';
            el.textContent = elements[Math.floor(Math.random() * elements.length)];
            el.style.left = Math.random() * window.innerWidth + 'px';
            el.style.top = window.innerHeight + 10 + 'px';
            el.style.fontSize = (Math.random() * 16 + 10) + 'px';
            document.body.appendChild(el);

            gsap.to(el, {
                y: -window.innerHeight - 50,
                x: '+=' + (Math.random() * 100 - 50),
                rotation: Math.random() * 360,
                duration: Math.random() * 8 + 8,
                opacity: 0,
                onComplete: () => el.remove()
            });
        }

        function spawnLoveText() {
            const texts = ["pookie 💖", "mine 😌", "cutieeee 🌸", "my world 🌎", "baby 💕", "anu 💖", "forever 💍"];
            const t = document.createElement('div');
            t.className = 'floating-love-text';
            t.innerHTML = texts[Math.floor(Math.random() * texts.length)];
            t.style.left = Math.random() * 80 + 10 + 'vw';
            t.style.bottom = '-50px';
            t.style.fontSize = (Math.random() * 5 + 14) + 'px';
            document.body.appendChild(t);

            gsap.to(t, {
                y: -window.innerHeight - 100,
                x: (Math.random() - 0.5) * 150,
                rotation: (Math.random() - 0.5) * 30,
                opacity: 0,
                duration: 9 + Math.random() * 4,
                ease: "power1.out",
                onComplete: () => t.remove()
            });
        }

        setInterval(createFloatingElement, 1800);
        setInterval(spawnLoveText, 2800);

        // ====== CURSOR & GLOW ======
        const cursor = document.querySelector('.custom-cursor');
        const mouseGlow = document.querySelector('.mouse-glow');

        document.addEventListener('mousemove', (e) => {
            if (mouseGlow) {
                gsap.to(mouseGlow, {
                    x: e.clientX - 150,
                    y: e.clientY - 150,
                    duration: 0.3,
                    ease: "power2.out"
                });
            }

            if (cursor) {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            }
        });

        document.addEventListener('mouseover', (e) => {
            if (e.target.closest('a, button, .interactive, .hoverable, .cta-button, .option-btn, .music-toggle, [role="button"]')) {
                if (cursor) cursor.classList.add('hovered');
            }
        });

        document.addEventListener('mouseout', (e) => {
            if (e.target.closest('a, button, .interactive, .hoverable, .cta-button, .option-btn, .music-toggle, [role="button"]')) {
                if (cursor) cursor.classList.remove('hovered');
            }
        });

        // ====== MUSIC ======
        window.addEventListener("click", () => {
            const music = document.getElementById("bgMusic");
            if (music) {
                music.play().catch(e => console.log(e));
            }
        }, { once: true });

        window.toggleMusic = function() {
            const music = document.getElementById("bgMusic");
            if (music) {
                if (music.paused) {
                    music.play().catch(e => console.log(e));
                } else {
                    music.pause();
                }
            }
        }

        window.addEventListener('load', () => {
            renderQuestion();
            const audio = document.getElementById('bgMusic');
            if (audio) {
                audio.volume = 0.4;
                audio.play().catch(err => {
                    console.log("Autoplay blocked, waiting for user click.");
                });
            }
        });

        // ====== CTA TRANSITION ======
        document.addEventListener('click', (e) => {
            if (e.target.closest('.cta-button')) {
                e.preventDefault();
                gsap.to('body', {
                    opacity: 0, duration: 1,
                    onComplete: () => { window.location.href = 'coupons.html'; }
                });
            }
        });
    </script>
</body>

</html>
